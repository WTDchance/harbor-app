name: AWS Deploy (parallel/aws-v1)

on:
  push:
    branches:
      - parallel/aws-v1
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: aws-deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  ECR_REPO: harbor-${{ github.event.inputs.environment || 'staging' }}-app
  ECS_CLUSTER: harbor-${{ github.event.inputs.environment || 'staging' }}
  ECS_SERVICE: harbor-${{ github.event.inputs.environment || 'staging' }}-app
  CONTAINER_NAME: app

permissions:
  id-token: write   # OIDC → AWS
  contents: read

jobs:
  build-and-push:
    name: Build + Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=${{ env.ENVIRONMENT }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::417242953135:role/harbor-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch NEXT_PUBLIC_* build args from SSM
        id: pubvars
        run: |
          # Pull all NEXT_PUBLIC_* params for this env so they can be inlined
          # by `next build`. These are non-secret by design (browser-visible).
          PARAMS=$(aws ssm get-parameters-by-path \
            --path /harbor-${{ env.ENVIRONMENT }}/ \
            --recursive \
            --with-decryption \
            --query 'Parameters[?contains(Name, `NEXT_PUBLIC`)].[Name,Value]' \
            --output text)
          : > build_args.env
          while IFS=$'\t' read -r name value; do
            [ -z "$name" ] && continue
            key="${name##*/}"
            echo "$key=$value" >> build_args.env
          done <<< "$PARAMS"
          echo "Resolved $(wc -l < build_args.env) NEXT_PUBLIC_* keys"
          # Echo just the keys (not values) for visibility
          cut -d= -f1 build_args.env

      - name: Build + push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPO:$TAG
          # Convert build_args.env into --build-arg KEY=VALUE flags
          BUILD_ARGS=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            BUILD_ARGS+=( --build-arg "$line" )
          done < build_args.env
          docker build \
            --build-arg NODE_ENV=${{ env.ENVIRONMENT }} \
            "${BUILD_ARGS[@]}" \
            -t $IMAGE_URI \
            -t $REGISTRY/$ECR_REPO:latest \
            .
          docker push $IMAGE_URI
          docker push $REGISTRY/$ECR_REPO:latest
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  migrate:
    name: DB migrations (DISABLED - see task #54)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Skip - RDS is private, GHA runners are public
        run: |
          echo "Migrate job disabled — RDS is in a private subnet and a public GHA runner cannot reach it."
          echo "Schema is applied out-of-band for now. See task #54 for the ECS one-off task plan."
          exit 0

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push  # migrate disabled — RDS is private; see task #54
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: https://lab.harboroffice.ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::417242953135:role/harbor-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query 'taskDefinition' > taskdef.json

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy updated task def to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Curl /api/health
        run: |
          URL=https://lab.harboroffice.ai/api/health
          for i in {1..10}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" $URL || true)
            if [ "$CODE" = "200" ]; then
              echo "Health OK"
              exit 0
            fi
            echo "Attempt $i: $CODE — retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1
